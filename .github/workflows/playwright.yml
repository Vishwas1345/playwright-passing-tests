name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Run Playwright tests
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        env:
          TESTDINO_TOKEN: ${{ secrets.TESTDINO_TOKEN }}
        run: npx playwright test

      - name: Debug report output
        if: always()
        run: |
          echo "=== playwright-report tree ==="
          ls -la playwright-report/ || echo "playwright-report/ missing"
          echo "=== report.json head ==="
          if [ -f playwright-report/report.json ]; then
            echo "size: $(wc -c < playwright-report/report.json) bytes"
            head -c 500 playwright-report/report.json
            echo ""
            node -e "const r=require('./playwright-report/report.json'); console.log('keys:', Object.keys(r).join(','))" || echo "JSON parse failed"
          else
            echo "report.json does not exist"
          fi

      - name: Upload to TestDino
        if: always()
        run: npx tdpw upload ./playwright-report --token="${{ secrets.TESTDINO_TOKEN }}" --upload-html

      - name: Upload Playwright HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test results
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
